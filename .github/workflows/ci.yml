name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      # DB-backed tests skip themselves when Supabase env is absent.
      - run: npm run test:coverage
      # Builds green without env: the Supabase client is lazy and env
      # validation only runs at server boot, never at build time.
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: checks
    # Serialize: all E2E runs share one test database.
    concurrency:
      group: e2e-shared-test-db
      cancel-in-progress: false
    # Skip silently when the repo has no E2E secrets configured (e.g. forks).
    if: ${{ vars.E2E_ENABLED == 'true' }}
    env:
      SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
      DEMO_MODE: "true"
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Auto-deploy to Vercel production after checks pass. Dormant until you set
  # the repo variable DEPLOY_ENABLED=true AND the secret VERCEL_TOKEN (mirrors
  # the e2e gating above). Builds with Vercel's toolchain and ships the
  # prebuilt output, so a bad build never reaches production.
  #
  # If Vercel's native Git integration is still connected, disable its
  # auto-deploy (Project → Settings → Git) to avoid deploying twice per push.
  deploy:
    runs-on: ubuntu-latest
    needs: checks
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true' }}
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    env:
      VERCEL_ORG_ID: team_n4LtofwIARvH2BTgKXmwGSmV
      VERCEL_PROJECT_ID: prj_RDFjSF8TywKqokri2wl3SN1jYHlb
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm i -g vercel@latest
      - run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
      - run: vercel build --prod --token="$VERCEL_TOKEN"
      - run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
