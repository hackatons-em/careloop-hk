name: Uptime

# Zero-cost uptime monitor: probes the production health endpoint every
# 15 minutes. On failure it opens (or comments on) a GitHub issue, so an
# outage notifies the team via normal GitHub notifications. Replace with a
# dedicated monitor (BetterStack/Checkly) when one is set up — see
# docs/GO-TO-MARKET.md.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe /api/health
        id: probe
        run: |
          set +e
          # Probe the www host directly (the apex 308-redirects to it) and follow
          # redirects (-L) for safety. Retry up to 3x so a single transient blip
          # (cold start / network) never raises a false outage alert.
          URL="https://www.miruwa.com/api/health"
          STATUS=000
          for attempt in 1 2 3; do
            STATUS=$(curl -sL -o /tmp/body -w "%{http_code}" --max-time 20 "$URL")
            if [ "$STATUS" = "200" ]; then
              echo "Health OK (HTTP 200) on attempt $attempt"
              break
            fi
            echo "Attempt $attempt: HTTP $STATUS"
            [ "$attempt" -lt 3 ] && sleep 10
          done
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "body=$(head -c 200 /tmp/body)" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed after 3 attempts with HTTP $STATUS"
            exit 1
          fi
      - name: Open or update outage issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "🔴 Production health check failing";
            const status = "${{ steps.probe.outputs.status }}" || "no response";
            const body = [
              `\`GET /api/health\` returned **${status}** at ${new Date().toISOString()}.`,
              "",
              "Check: Vercel deployment status, Supabase status, recent deploys.",
              "This issue was opened automatically by `.github/workflows/uptime.yml`.",
            ].join("\n");
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "outage",
            });
            const existing = issues.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["outage"],
              });
            }
